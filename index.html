<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kesf — Discover Azerbaijan</title>
  <meta name="description" content="Kesf is Azerbaijan's discovery platform. Find restaurants, tea houses, hotels, nightlife, activities and more in Baku, Ganja, Sheki, and Quba.">
  <meta name="theme-color" content="#ef6f2e">
  <meta property="og:title" content="Kesf — Discover Azerbaijan">
  <meta property="og:description" content="Find the best restaurants, hotels, activities and more across Azerbaijan.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>◈</text></svg>">
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="app">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:'JetBrains Mono',monospace;background:#fafafa">
      <div style="width:8px;height:8px;border-radius:50%;background:#ef6f2e;animation:pulse 1s ease-in-out infinite"></div>
      <span style="font-size:11px;text-transform:uppercase;letter-spacing:-0.02em;color:#5c5855">Loading Kesf...</span>
      <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.5);opacity:1}}</style>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      APP.init();
    });
  </script>
</body>
</html>
