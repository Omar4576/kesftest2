<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kesf — Discover Azerbaijan</title>
  <script>
    // GitHub Pages SPA fallback: redirect any unknown path back to index.html,
    // preserving the path so the router can pick it up.
    sessionStorage.setItem('kesf_redirect_path', location.pathname + location.search);
    location.replace('/index.html');
  </script>
</head>
